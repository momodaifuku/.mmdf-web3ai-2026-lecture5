<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Curation</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-camera-retro"></i>
                <span>Memoria</span>
            </div>
            <div class="nav-pills">
                <button id="nav-swipe" class="active">Swipe</button>
                <button id="nav-gallery">Gallery</button>
            </div>
        </header>

        <!-- Timer Bar for Swipe Challenge -->
        <div class="timer-container" id="timer-container">
            <div class="timer-bar" id="timer-bar"></div>
            <div class="timer-text" id="timer-text">30s</div>
        </div>

        <!-- Main Content Area -->
        <main>
            <!-- Start View -->
            <section id="start-view" class="view active">
                <div class="start-container">
                    <h2>Select Photos</h2>
                    <p>Choose photos from your device to start the curation challenge.</p>
                    
                    <div class="settings-group" style="margin-bottom: 25px; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                        <label style="display: block; margin-bottom: 10px; color: var(--text-light); font-weight: 600;"><i class="fa-solid fa-stopwatch"></i> Timer Setting</label>
                        <select id="timer-setting" style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); font-family: inherit; font-size: 1rem; outline: none;">
                            <option value="15">15 Seconds (Speedrun)</option>
                            <option value="30" selected>30 Seconds (Standard)</option>
                            <option value="60">60 Seconds (Relaxed)</option>
                            <option value="0">No Timer (Zen Mode)</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                        <label for="file-input" class="primary-btn file-label" style="flex: 1; min-width: 140px; margin-bottom: 0;">
                            <i class="fa-solid fa-images"></i> Select Files
                        </label>
                        <input type="file" id="file-input" multiple accept="image/*,.cr2,.cr3,.arw,.dng,.nef" style="display: none;">
                        
                        <label for="folder-input" class="primary-btn file-label" style="flex: 1; min-width: 140px; background-color: #6366f1; margin-bottom: 0;">
                            <i class="fa-solid fa-folder-open"></i> Select Folder
                        </label>
                        <input type="file" id="folder-input" webkitdirectory directory multiple style="display: none;">
                    </div>
                </div>
            </section>

            <!-- Swipe View -->
            <section id="swipe-view" class="view hidden">
                <div class="card-container" id="card-container">
                    <!-- Cards will be injected here by JS -->
                </div>
                
                <div class="action-buttons">
                    <button class="btn-action btn-undo" id="btn-undo" title="Undo (Ctrl+Z)">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                    <button class="btn-action btn-nope" id="btn-nope">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <button class="btn-action btn-superlike" id="btn-superlike">
                        <i class="fa-solid fa-star"></i>
                    </button>
                    <button class="btn-action btn-like" id="btn-like">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
                
                <!-- Game Over Overlay -->
                <div id="game-over" class="overlay hidden">
                    <h2>Challenge Complete!</h2>
                    <p>You organized your photos.</p>
                    <div id="analytics-box" class="analytics-box">
                        <p>Processed: <span id="stat-processed">0</span> photos</p>
                        <p>Kept: <span id="stat-kept">0</span> photos</p>
                        <p>Speed: <span id="stat-speed">0.0</span> sec/photo</p>
                    </div>
                    <button id="btn-view-gallery" class="primary-btn" style="margin-top: 15px;">View Best Album</button>
                </div>
            </section>

            <!-- Gallery View -->
            <section id="gallery-view" class="view hidden">
                <div class="gallery-header">
                    <h2>Your Best Album</h2>
                    <p>The photos you decided to keep.</p>
                    <button id="btn-copy-list" class="primary-btn" style="margin-top: 10px; padding: 8px 16px; font-size: 0.9rem; background-color: #3b82f6;">
                        <i class="fas fa-copy"></i> Copy Filenames
                    </button>
                    <button id="btn-download-zip" class="primary-btn" style="margin-top: 10px; margin-left: 10px; padding: 8px 16px; font-size: 0.9rem; background-color: #10b981;">
                        <i class="fas fa-file-zipper"></i> Download ZIP
                    </button>
                </div>
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Kept photos will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Hammer.js for swipe gestures -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js?v=4"></script>
</body>
</html>
